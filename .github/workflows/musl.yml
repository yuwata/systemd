---
# vi: ts=2 sw=2 et:
# SPDX-License-Identifier: LGPL-2.1-or-later
#
name: Build with musl and run unit tests
on:
  pull_request:
    paths:
      - '**/meson.build'
      - '.github/workflows/**'
      - 'meson_options.txt'
      - 'src/**'
      - 'test/fuzz/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up
        uses: jirutka/setup-alpine@v1
        with:
          arch: x86_64
          packages: >
            acl-dev
            audit-dev
            bash
            bash-completion-dev
            build-base
            bzip2-dev
            coreutils
            cryptsetup-dev
            curl-dev
            dbus-dev
            elfutils-dev
            gettext-dev
            git
            glib-dev
            gnutls-dev
            gperf
            grep
            iptables-dev
            kbd
            kexec-tools
            kmod
            kmod-dev
            libapparmor-dev
            libarchive-dev
            libbpf-dev
            libcap-dev
            libfido2-dev
            libgcrypt-dev
            libidn2-dev
            libmicrohttpd-dev
            libpwquality-dev
            libqrencode-dev
            libseccomp-dev
            libselinux-dev
            libxkbcommon-dev
            linux-pam-dev
            lz4-dev
            meson
            ninja-build
            openssl-dev
            p11-kit-dev
            pcre2-dev
            pkgconf
            polkit-dev
            py3-elftools
            py3-jinja2
            py3-pefile
            quota-tools
            rsync
            tpm2-tss-dev
            tpm2-tss-esys
            tpm2-tss-rc
            tpm2-tss-tcti-device
            tzdata
            util-linux-dev
            util-linux-login
            valgrind-dev
            xen-dev
            zlib-dev
            zstd-dev

      - name: Build
        run: |
          if ! meson setup --werror -Dtests=unsafe -Dslow-tests=true -Dfuzz-tests=true -Dlibc=musl build; then
              cat build/meson-logs/meson-log.txt
              exit 1
          fi
          env | grep '^PATH='
          ninja -C build -v
        shell: alpine.sh {0}

      - name: Run unit tests
        run: |
          # For test-path-util
          ls -l /usr/bin/sh || ln -s /usr/bin/bash /usr/bin/sh
          meson test -C build --print-errorlogs
        shell: alpine.sh --root {0}
